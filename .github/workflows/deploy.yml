name: Deploy to GitHub Pages

on:
  # Run after daily expansion completes
  workflow_run:
    workflows: ["Daily Country Expansion"]
    types: [completed]
  # Run on any push to main (manual commits too)
  push:
    branches: [main]
    paths: [generated_pages/**]
  # Manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Don't publish the raw .md/.json sources — they were duplicate, indexable
      # copies of every .html page (~24k extra URLs wasting crawl budget). They
      # stay in the repo (the generator uses them); only the published site drops
      # them. This deletes from the checkout, not the repo.
      - name: Strip duplicate raw sources from the published site
        run: find generated_pages -type f \( -name '*.md' -o -name '*.json' \) -delete

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: generated_pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
